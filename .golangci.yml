version: "2"

linters:
  enable:
    - bodyclose    # HTTP response bodies must be closed
    - errcheck     # unhandled errors
    - govet        # suspicious constructs
    - ineffassign  # assignments to variables never used afterwards
    - misspell     # common spelling mistakes in comments/strings
    - noctx        # http calls without context
    - staticcheck  # broad static analysis (includes gosimple rules)
    - unused       # unused code
    - whitespace   # unnecessary whitespace

  settings:
    errcheck:
      # Don't flag explicit blank-id assignments (_, err) or (x, _)
      check-blank: false
